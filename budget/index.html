<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간 가계부</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;
    --accent:#c8ff00;--accent2:#ff6b35;--text:#f0f0f0;--text2:#888;--text3:#555;
    --danger:#ff4444;--success:#00cc66;--radius:12px;
    --jy:#4da6ff;--js:#ff80cc;--sh:#a78bfa;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}

  #loading-overlay{position:fixed;inset:0;background:rgba(15,15,15,0.85);display:none;align-items:center;justify-content:center;z-index:2000;flex-direction:column;gap:16px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:13px;color:var(--text2);font-family:'Space Mono',monospace;}

  #pin-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:32px;}
  .pin-logo{font-family:'Space Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:4px;}
  .pin-title{font-size:28px;font-weight:700;text-align:center;}
  .pin-subtitle{font-size:14px;color:var(--text2);text-align:center;}
  .pin-dots{display:flex;gap:16px;margin:8px 0;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all 0.2s;}
  .pin-dot.filled{background:var(--accent);border-color:var(--accent);}
  .pin-dot.error{background:var(--danger);border-color:var(--danger);}
  .pin-keypad{display:grid;grid-template-columns:repeat(3,72px);gap:12px;}
  .pin-key{width:72px;height:72px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:22px;font-family:'Space Mono',monospace;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
  .pin-key:hover{background:var(--surface2);border-color:var(--text3);}
  .pin-key:active{transform:scale(0.93);}
  .pin-key.del{font-size:16px;color:var(--text2);}
  .pin-key.zero{grid-column:2;}
  .pin-error{color:var(--danger);font-size:13px;height:18px;text-align:center;}

  #app{display:none;max-width:720px;margin:0 auto;padding:24px 16px 80px;}
  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
  .app-title{font-family:'Space Mono',monospace;font-size:13px;color:var(--text3);letter-spacing:3px;}
  .month-nav{display:flex;align-items:center;gap:16px;}
  .month-nav button{background:none;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
  .month-nav button:hover{border-color:var(--accent);color:var(--accent);}
  .month-display{font-size:18px;font-weight:700;min-width:80px;text-align:center;}
  .lock-btn{background:none;border:1px solid var(--border);color:var(--text3);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
  .lock-btn:hover{border-color:var(--danger);color:var(--danger);}

  .person-filter{display:flex;gap:8px;margin-bottom:20px;}
  .person-filter-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all 0.2s;}
  .person-filter-btn.all.active{background:rgba(200,255,0,0.1);border-color:var(--accent);color:var(--accent);}
  .person-filter-btn.jy.active{background:rgba(77,166,255,0.1);border-color:var(--jy);color:var(--jy);}
  .person-filter-btn.js.active{background:rgba(255,128,204,0.1);border-color:var(--js);color:var(--js);}
  .person-filter-btn.sh.active{background:rgba(167,139,250,0.1);border-color:var(--sh);color:var(--sh);}

  .summary-section{margin-bottom:24px;}
  .summary-person{margin-bottom:16px;}
  .summary-person-title{font-size:12px;font-family:'Space Mono',monospace;letter-spacing:2px;margin-bottom:10px;padding:6px 12px;border-radius:6px;display:inline-block;}
  .summary-person-title.jy{background:rgba(77,166,255,0.1);color:var(--jy);}
  .summary-person-title.js{background:rgba(255,128,204,0.1);color:var(--js);}
  .summary-person-title.sh{background:rgba(167,139,250,0.1);color:var(--sh);}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;}
  .summary-label{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;font-family:'Space Mono',monospace;}
  .summary-amount{font-size:18px;font-weight:700;font-family:'Space Mono',monospace;}
  .summary-amount.income{color:var(--success);}
  .summary-amount.expense{color:var(--accent2);}
  .summary-amount.balance.positive{color:var(--accent);}
  .summary-amount.balance.negative{color:var(--danger);}

  .tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:10px;padding:4px;}
  .tab{flex:1;padding:10px;border:none;background:none;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-radius:8px;transition:all 0.2s;}
  .tab.active{background:var(--surface2);color:var(--text);font-weight:500;}

  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
  .section-title{font-size:13px;color:var(--text2);margin-bottom:16px;font-weight:500;letter-spacing:1px;}

  .sms-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;padding:14px;resize:vertical;min-height:100px;transition:border-color 0.2s;line-height:1.6;}
  .sms-textarea:focus{outline:none;border-color:var(--accent);}
  .sms-textarea::placeholder{color:var(--text3);}

  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all 0.15s;}
  .btn-primary{background:var(--accent);color:#000;width:100%;justify-content:center;margin-top:12px;font-weight:700;}
  .btn-primary:hover{opacity:0.88;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;}

  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-label{font-size:12px;color:var(--text2);}
  .form-input,.form-select{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;padding:10px 12px;transition:border-color 0.2s;width:100%;}
  .form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);}
  .form-select option{background:var(--surface);}

  .toggle-group{display:flex;gap:6px;flex-wrap:wrap;}
  .toggle-btn{flex:1;padding:9px 6px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);cursor:pointer;font-size:13px;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;min-width:60px;}
  .toggle-btn.active-expense{background:rgba(255,107,53,0.15);border-color:var(--accent2);color:var(--accent2);}
  .toggle-btn.active-income{background:rgba(0,204,102,0.15);border-color:var(--success);color:var(--success);}
  .toggle-btn.active-jy{background:rgba(77,166,255,0.15);border-color:var(--jy);color:var(--jy);}
  .toggle-btn.active-js{background:rgba(255,128,204,0.15);border-color:var(--js);color:var(--js);}
  .toggle-btn.active-sh{background:rgba(167,139,250,0.15);border-color:var(--sh);color:var(--sh);}

  .transaction-list{display:flex;flex-direction:column;gap:8px;}
  .transaction-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:fadeIn 0.3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .tx-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0;}
  .tx-category{width:36px;height:36px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .tx-info{flex:1;min-width:0;}
  .tx-desc{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tx-meta{font-size:11px;color:var(--text3);margin-top:2px;font-family:'Space Mono',monospace;display:flex;align-items:center;gap:6px;}
  .tx-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .tx-amount{font-size:15px;font-weight:700;font-family:'Space Mono',monospace;}
  .tx-amount.expense{color:var(--accent2);}
  .tx-amount.income{color:var(--success);}
  .tx-delete{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
  .tx-delete:hover{background:rgba(255,68,68,0.15);color:var(--danger);}

  .person-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;letter-spacing:0.5px;}
  .person-badge.jy{background:rgba(77,166,255,0.15);color:var(--jy);}
  .person-badge.js{background:rgba(255,128,204,0.15);color:var(--js);}
  .person-badge.sh{background:rgba(167,139,250,0.15);color:var(--sh);}

  .category-bar{margin-bottom:12px;}
  .category-bar-header{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .category-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
  .category-bar-fill{height:100%;border-radius:3px;background:var(--accent2);transition:width 0.5s ease;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px;}
  .empty-icon{font-size:40px;margin-bottom:12px;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:24px;font-size:14px;z-index:3000;transition:transform 0.3s ease;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  @media(max-width:480px){.summary-grid{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}.summary-amount{font-size:16px;}}
  .shake{animation:shake 0.4s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">불러오는 중...</div>
</div>

<div class="toast" id="toast"></div>

<div id="pin-screen">
  <div class="pin-logo">PASKA BUDGET</div>
  <div>
    <div class="pin-title">🔒 PIN 입력</div>
    <div class="pin-subtitle" style="margin-top:8px">가계부에 접근하려면 PIN을 입력하세요</div>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-keypad">
    <button class="pin-key" onclick="pinInput('1')">1</button>
    <button class="pin-key" onclick="pinInput('2')">2</button>
    <button class="pin-key" onclick="pinInput('3')">3</button>
    <button class="pin-key" onclick="pinInput('4')">4</button>
    <button class="pin-key" onclick="pinInput('5')">5</button>
    <button class="pin-key" onclick="pinInput('6')">6</button>
    <button class="pin-key" onclick="pinInput('7')">7</button>
    <button class="pin-key" onclick="pinInput('8')">8</button>
    <button class="pin-key" onclick="pinInput('9')">9</button>
    <button class="pin-key zero" onclick="pinInput('0')">0</button>
    <button class="pin-key del" onclick="pinDelete()">⌫</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="app-title">BUDGET</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-display" id="month-display"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <button class="lock-btn" onclick="lockApp()">🔒 잠금</button>
  </div>

  <!-- 인물 필터 -->
  <div class="person-filter">
    <button class="person-filter-btn all active" onclick="setPersonFilter('all',this)">전체</button>
    <button class="person-filter-btn jy" onclick="setPersonFilter('jy',this)">👨 김정엽</button>
    <button class="person-filter-btn js" onclick="setPersonFilter('js',this)">👩 최정순</button>
    <button class="person-filter-btn sh" onclick="setPersonFilter('sh',this)">👩 박선현</button>
  </div>

  <div class="summary-section" id="summary-section"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('input',this)">📝 입력</button>
    <button class="tab" onclick="switchTab('list',this)">📋 내역</button>
    <button class="tab" onclick="switchTab('analysis',this)">📊 분석</button>
  </div>

  <!-- 입력 탭 -->
  <div id="tab-input">
    <div class="section">
      <div class="section-title">📱 문자 메시지 붙여넣기</div>
      <div style="margin-bottom:12px">
        <div class="form-label" style="margin-bottom:6px">누구 지출?</div>
        <div class="toggle-group">
          <button class="toggle-btn active-jy" id="sms-person-jy" onclick="setSmsPerson('jy')">👨 김정엽</button>
          <button class="toggle-btn" id="sms-person-js" onclick="setSmsPerson('js')">👩 최정순</button>
          <button class="toggle-btn" id="sms-person-sh" onclick="setSmsPerson('sh')">👩 박선현</button>
        </div>
      </div>
      <textarea class="sms-textarea" id="sms-input" placeholder="카드 사용 문자메시지를 여기에 붙여넣으세요.&#10;&#10;예시:&#10;[Web발신]&#10;신한카드 승인&#10;김*엽 1,500원&#10;일시불 스타벅스&#10;04/22 10:30 잔여한도..."></textarea>
      <button class="btn btn-primary" id="sms-btn" onclick="parseSMS()">🔍 자동 인식 및 추가</button>
    </div>

    <div class="section">
      <div class="section-title">✏️ 직접 입력</div>
      <div class="form-row">
        <div class="form-group">
          <div class="form-label" style="margin-bottom:6px">유형</div>
          <div class="toggle-group">
            <button class="toggle-btn active-expense" id="type-expense" onclick="setType('expense')">지출</button>
            <button class="toggle-btn" id="type-income" onclick="setType('income')">수입</button>
          </div>
        </div>
        <div class="form-group">
          <div class="form-label" style="margin-bottom:6px">누구?</div>
          <div class="toggle-group">
            <button class="toggle-btn active-jy" id="person-jy" onclick="setManualPerson('jy')">👨 정엽</button>
            <button class="toggle-btn" id="person-js" onclick="setManualPerson('js')">👩 정순</button>
            <button class="toggle-btn" id="person-sh" onclick="setManualPerson('sh')">👩 선현</button>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">금액 (원)</label>
          <input type="number" class="form-input" id="manual-amount" placeholder="0" inputmode="numeric">
        </div>
        <div class="form-group">
          <label class="form-label">날짜</label>
          <input type="date" class="form-input" id="manual-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-select" id="manual-category">
            <option value="🍽️ 식비">🍽️ 식비</option>
            <option value="🚌 교통">🚌 교통</option>
            <option value="🛒 쇼핑">🛒 쇼핑</option>
            <option value="🏠 주거">🏠 주거</option>
            <option value="🏥 의료">🏥 의료</option>
            <option value="🎬 여가">🎬 여가</option>
            <option value="📚 교육">📚 교육</option>
            <option value="💰 수입">💰 수입</option>
            <option value="📌 기타">📌 기타</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">내용</label>
          <input type="text" class="form-input" id="manual-desc" placeholder="예: 점심식사">
        </div>
      </div>
      <button class="btn btn-primary" id="manual-btn" onclick="addManual()">+ 추가</button>
    </div>
  </div>

  <!-- 내역 탭 -->
  <div id="tab-list" style="display:none">
    <div class="section">
      <div class="section-title">이번 달 내역</div>
      <div class="transaction-list" id="transaction-list"></div>
    </div>
  </div>

  <!-- 분석 탭 -->
  <div id="tab-analysis" style="display:none">
    <div id="analysis-jy" class="section">
      <div class="section-title" style="color:var(--jy)">👨 김정엽 카테고리별 지출</div>
      <div id="category-analysis-jy"></div>
    </div>
    <div id="analysis-js" class="section">
      <div class="section-title" style="color:var(--js)">👩 최정순 카테고리별 지출</div>
      <div id="category-analysis-js"></div>
    </div>
    <div id="analysis-sh" class="section">
      <div class="section-title" style="color:var(--sh)">👩 박선현 카테고리별 지출</div>
      <div id="category-analysis-sh"></div>
    </div>
  </div>
</div>

<script>
const _e = ['https://script.google.com','macros','s','AKfycbx6yV7rpPxZvgxzgelmDpJk_MWfca2S2RwotlkOAQvU8oT7elUHsJxwKJ52xScOkWfB','exec'].join('/');

let pinBuffer = '';
let authToken = sessionStorage.getItem('budget_token') || null;
let currentType = 'expense';
let currentManualPerson = 'jy';
let currentSmsPerson = 'jy';
let currentPersonFilter = 'all';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let allData = [];

const PERSONS = ['jy', 'js', 'sh'];
const PERSON_LABEL = { jy: '김정엽', js: '최정순', sh: '박선현' };
const PERSON_EMOJI = { jy: '👨', js: '👩', sh: '👩' };

// 문자에서 인물 자동 감지 패턴
const PERSON_PATTERNS = {
  jy: /김\*엽/,
  js: /최\*순/,
  sh: /박\*현/
};

function showLoading(text='처리 중...'){
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-overlay').style.display = 'flex';
}
function hideLoading(){ document.getElementById('loading-overlay').style.display = 'none'; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// PIN
function pinInput(digit){
  if(pinBuffer.length >= 6) return;
  pinBuffer += digit; updatePinDots();
  if(pinBuffer.length === 6) setTimeout(checkPin, 200);
}
function pinDelete(){ pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots(error=false){
  document.querySelectorAll('.pin-dot').forEach((dot,i)=>{
    dot.classList.remove('filled','error');
    if(i < pinBuffer.length) dot.classList.add(error?'error':'filled');
  });
}

async function checkPin(){
  showLoading('인증 중...');
  try {
    const res = await fetch(`${_e}?action=auth&pin=${pinBuffer}&t=${Date.now()}`, {
      method:'GET', redirect:'follow'
    });
    const json = JSON.parse(await res.text());
    hideLoading();
    if(json.success){
      authToken = json.token;
      sessionStorage.setItem('budget_token', authToken);
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      initApp();
    } else {
      updatePinDots(true);
      document.getElementById('pin-error').textContent = 'PIN이 올바르지 않습니다';
      document.getElementById('pin-dots').classList.add('shake');
      setTimeout(()=>{
        document.getElementById('pin-dots').classList.remove('shake');
        pinBuffer = ''; updatePinDots();
        document.getElementById('pin-error').textContent = '';
      }, 800);
    }
  } catch(e){
    hideLoading();
    showToast('⚠️ 인증 실패. 네트워크를 확인하세요.');
    pinBuffer = ''; updatePinDots();
  }
}

function lockApp(){
  authToken = null;
  sessionStorage.removeItem('budget_token');
  pinBuffer = ''; updatePinDots();
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// API
async function fetchData(){
  showLoading('데이터 불러오는 중...');
  try {
    const res = await fetch(`${_e}?token=${authToken}&t=${Date.now()}`, {
      method:'GET', redirect:'follow'
    });
    const json = JSON.parse(await res.text());
    if(!json.success && json.message === '인증 필요'){ hideLoading(); lockApp(); return; }
    allData = (json.data || []).filter(r => r.id);
  } catch(e){
    showToast('⚠️ 데이터 로드 실패');
    allData = [];
  }
  hideLoading();
}

async function postData(payload){
  const res = await fetch(_e, {
    method:'POST', redirect:'follow',
    body: JSON.stringify({ ...payload, token: authToken })
  });
  const json = JSON.parse(await res.text());
  if(!json.success && json.message === '인증 필요') lockApp();
  return json;
}

async function initApp(){
  document.getElementById('manual-date').value = new Date().toISOString().split('T')[0];
  updateMonthDisplay();
  await fetchData();
  updateSummary();
  renderTransactions();
}

function updateMonthDisplay(){
  document.getElementById('month-display').textContent =
    `${currentYear}.${String(currentMonth).padStart(2,'0')}`;
}

async function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth > 12){ currentMonth=1; currentYear++; }
  if(currentMonth < 1){ currentMonth=12; currentYear--; }
  updateMonthDisplay();
  await fetchData();
  updateSummary();
  renderTransactions();
  renderAnalysis();
}

function switchTab(tab, el){
  ['input','list','analysis'].forEach(t=>{
    document.getElementById(`tab-${t}`).style.display='none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).style.display='block';
  el.classList.add('active');
  if(tab==='input'){
    setType(currentType);
    setManualPerson(currentManualPerson);
    setSmsPerson(currentSmsPerson);
  }
  if(tab==='list') renderTransactions();
  if(tab==='analysis') renderAnalysis();
}

function setPersonFilter(person, el){
  currentPersonFilter = person;
  document.querySelectorAll('.person-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  updateSummary();
  renderTransactions();
  renderAnalysis();
}

function setType(type){
  currentType = type;
  document.getElementById('type-expense').className = 'toggle-btn'+(type==='expense'?' active-expense':'');
  document.getElementById('type-income').className = 'toggle-btn'+(type==='income'?' active-income':'');
  document.getElementById('manual-category').value = type==='income' ? '💰 수입' : '🍽️ 식비';
}

function setManualPerson(person){
  currentManualPerson = person;
  PERSONS.forEach(p => {
    document.getElementById(`person-${p}`).className = 'toggle-btn'+(person===p?` active-${p}`:'');
  });
}

function setSmsPerson(person){
  currentSmsPerson = person;
  PERSONS.forEach(p => {
    document.getElementById(`sms-person-${p}`).className = 'toggle-btn'+(person===p?` active-${p}`:'');
  });
}

function getMonthData(){
  const mm = String(currentMonth).padStart(2,'0');
  let data = allData.filter(t => String(t.date).startsWith(`${currentYear}-${mm}`));
  if(currentPersonFilter !== 'all') data = data.filter(t => t.person === currentPersonFilter);
  return data;
}

function getMonthDataByPerson(person){
  const mm = String(currentMonth).padStart(2,'0');
  return allData.filter(t => String(t.date).startsWith(`${currentYear}-${mm}`) && t.person === person);
}

function updateSummary(){
  const el = document.getElementById('summary-section');
  const persons = currentPersonFilter === 'all' ? PERSONS : [currentPersonFilter];
  el.innerHTML = persons.map(p => {
    const data = getMonthDataByPerson(p);
    const income = data.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
    const expense = data.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
    const balance = income - expense;
    return `<div class="summary-person">
      <div class="summary-person-title ${p}">${PERSON_EMOJI[p]} ${PERSON_LABEL[p]}</div>
      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">수입</div><div class="summary-amount income">₩${income.toLocaleString()}</div></div>
        <div class="summary-card"><div class="summary-label">지출</div><div class="summary-amount expense">₩${expense.toLocaleString()}</div></div>
        <div class="summary-card"><div class="summary-label">잔액</div><div class="summary-amount balance ${balance>=0?'positive':'negative'}">${balance>=0?'+':''}₩${balance.toLocaleString()}</div></div>
      </div>
    </div>`;
  }).join('');
}

// 문자에서 인물 자동 감지
function detectPerson(text){
  for(const [person, pattern] of Object.entries(PERSON_PATTERNS)){
    if(pattern.test(text)) return person;
  }
  return null;
}

async function parseSMS(){
  const text = document.getElementById('sms-input').value.trim();
  if(!text){ showToast('⚠️ 문자 메시지를 입력해주세요.'); return; }

  let amount = 0;
  const patterns = [/(\d{1,3}(?:,\d{3})*)\s*원/g, /₩\s*(\d{1,3}(?:,\d{3})*)/g];
  for(const p of patterns){
    p.lastIndex=0; const m=p.exec(text);
    if(m){ amount=parseInt(m[1].replace(/,/g,'')); break; }
  }
  if(!amount){ showToast('⚠️ 금액을 인식하지 못했습니다. 직접 입력해주세요.'); return; }

  let date = new Date().toISOString().split('T')[0];
  const dm = text.match(/(\d{2})\/(\d{2})/);
  if(dm) date = `${currentYear}-${dm[1]}-${dm[2]}`;

  // 문자에서 인물 자동 감지, 없으면 현재 선택 인물 사용
  const detectedPerson = detectPerson(text);
  const person = detectedPerson || currentSmsPerson;

  // 감지된 인물이 있으면 버튼 UI도 업데이트
  if(detectedPerson) setSmsPerson(detectedPerson);

  let desc = '카드결제';
  const mps = [/일시불\s+([^\n]+)/, /(?:승인|결제)\s*\n?([^\n\d]+?)(?:\s*\d|$)/];
  for(const p of mps){
    const m=text.match(p);
    if(m && m[1] && m[1].trim().length>1){ desc=m[1].trim().split(/\s+/)[0]; break; }
  }

  const category = autoCategory(desc, text);
  const id = Date.now();

  document.getElementById('sms-btn').disabled = true;
  showLoading('저장 중...');
  try {
    await postData({action:'add', id, date, type:'expense', amount, category, desc, person});
    allData.unshift({id, date, type:'expense', amount, category, desc, person});
    updateSummary();
    document.getElementById('sms-input').value = '';
    showToast(`✅ [${PERSON_LABEL[person]}] ${desc} ${Number(amount).toLocaleString()}원 추가됨`);
  } catch(e){ showToast('⚠️ 저장 실패. 다시 시도해주세요.'); }
  hideLoading();
  document.getElementById('sms-btn').disabled = false;
}

function autoCategory(desc, text){
  const s=(desc+text).toLowerCase();
  if(/스타벅스|커피|카페|편의점|gs25|cu |세븐|맥도날드|버거|치킨|피자|식당|마트|이마트|롯데마트|홈플러스|배달/.test(s)) return '🍽️ 식비';
  if(/지하철|버스|택시|카카오t|주유|주차|기름/.test(s)) return '🚌 교통';
  if(/쿠팡|네이버|11번가|지마켓|올리브영|무신사|쇼핑/.test(s)) return '🛒 쇼핑';
  if(/병원|약국|의원|클리닉|헬스/.test(s)) return '🏥 의료';
  if(/영화|cgv|롯데시네마|메가박스|게임|넷플릭스/.test(s)) return '🎬 여가';
  if(/학원|교육|책|도서|yes24|교보/.test(s)) return '📚 교육';
  if(/관리비|전기|가스|통신|인터넷/.test(s)) return '🏠 주거';
  return '📌 기타';
}

async function addManual(){
  const amount = parseInt(document.getElementById('manual-amount').value);
  const date = document.getElementById('manual-date').value;
  const category = document.getElementById('manual-category').value;
  const desc = document.getElementById('manual-desc').value.trim() || category;
  const person = currentManualPerson;

  if(!amount||amount<=0){ showToast('⚠️ 금액을 입력해주세요.'); return; }
  if(!date){ showToast('⚠️ 날짜를 선택해주세요.'); return; }

  const id = Date.now();
  document.getElementById('manual-btn').disabled = true;
  showLoading('저장 중...');
  try {
    await postData({action:'add', id, date, type:currentType, amount, category, desc, person});
    allData.unshift({id, date, type:currentType, amount, category, desc, person});
    updateSummary();
    document.getElementById('manual-amount').value = '';
    document.getElementById('manual-desc').value = '';
    showToast(`✅ [${PERSON_LABEL[person]}] ${desc} ${Number(amount).toLocaleString()}원 추가됨`);
  } catch(e){ showToast('⚠️ 저장 실패. 다시 시도해주세요.'); }
  hideLoading();
  document.getElementById('manual-btn').disabled = false;
}

async function deleteTransaction(id){
  if(!confirm('삭제하시겠습니까?')) return;
  showLoading('삭제 중...');
  try {
    await postData({action:'delete', id});
    allData = allData.filter(t => String(t.id) !== String(id));
    updateSummary(); renderTransactions(); renderAnalysis();
    showToast('🗑️ 삭제됨');
  } catch(e){ showToast('⚠️ 삭제 실패.'); }
  hideLoading();
}

function renderTransactions(){
  const data = getMonthData().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const el = document.getElementById('transaction-list');
  if(!data.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div>내역이 없습니다</div>';
    return;
  }
  el.innerHTML = data.map(t=>`
    <div class="transaction-item">
      <div class="tx-left">
        <div class="tx-category">${t.category.split(' ')[0]}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.desc}</div>
          <div class="tx-meta">
            <span class="person-badge ${t.person||'jy'}">${PERSON_LABEL[t.person||'jy']}</span>
            ${t.category.split(' ').slice(1).join(' ')} · ${t.date}
          </div>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'}₩${Number(t.amount).toLocaleString()}</div>
        <button class="tx-delete" onclick="deleteTransaction('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function renderAnalysis(){
  PERSONS.forEach(person => {
    const section = document.getElementById(`analysis-${person}`);
    const el = document.getElementById(`category-analysis-${person}`);
    if(currentPersonFilter !== 'all' && currentPersonFilter !== person){
      section.style.display='none'; return;
    }
    section.style.display='block';
    const data = getMonthDataByPerson(person).filter(t=>t.type==='expense');
    if(!data.length){
      el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div>지출 내역이 없습니다</div>';
      return;
    }
    const cats={};
    data.forEach(t=>{ cats[t.category]=(cats[t.category]||0)+Number(t.amount); });
    const total = Object.values(cats).reduce((s,v)=>s+v,0);
    el.innerHTML = Object.entries(cats).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
      const pct=Math.round(amt/total*100);
      return `<div class="category-bar">
        <div class="category-bar-header">
          <span>${cat}</span>
          <span style="font-family:'Space Mono',monospace;font-size:12px">₩${amt.toLocaleString()} (${pct}%)</span>
        </div>
        <div class="category-bar-track"><div class="category-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
  });
}

// 세션 토큰 있으면 바로 앱 진입
if(authToken){
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}
</script>
