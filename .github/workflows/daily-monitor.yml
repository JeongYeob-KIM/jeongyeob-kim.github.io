name: 나라장터 입찰공고 모니터링

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = KST 07:00
    - cron: "0 3 * * *"    # UTC 03:00 = KST 12:00
    - cron: "0 9 * * *"    # UTC 09:00 = KST 18:00
  workflow_dispatch:

concurrency:
  group: g2b-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 크롤러 실행
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
          TZ: Asia/Seoul
        run: python scripts/crawler.py

      - name: JSON 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etc/data/
          git diff --staged --quiet \
            && echo "변경사항 없음 - 커밋 생략" \
            || (git commit -m "나라장터 모니터링 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')" && git push)

      - name: Slack 알림 (선택)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          STAMP=$(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')
          FIT=$(python -c "import json; d=json.load(open('etc/data/bids_latest.json')); print(d['summary']['fit'])" 2>/dev/null || echo "?")
          STATUS="${{ job.status }}"
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"[$STAMP] 나라장터 모니터링 완료 | 적합 공고 ${FIT}건 | 상태: $STATUS\"}"
