name: 나라장터 입찰공고 모니터링

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 크롤러 실행
        env:
          G2B_API_KEY: ${{ secrets.G2B_API_KEY }}
        run: python diagnose.py

      - name: JSON 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add etc/data/
          git diff --staged --quiet \
            && echo "변경사항 없음 - 커밋 생략" \
            || (git commit -m "나라장터 모니터링 $(date +'%Y-%m-%d')" && git push)

      - name: Slack 알림 (선택)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then exit 0; fi
          DATE=$(date +'%Y-%m-%d')
          FIT=$(python -c "import json; d=json.load(open('etc/data/bids_latest.json')); print(d['summary']['fit'])" 2>/dev/null || echo "?")
          STATUS="${{ job.status }}"
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"[$DATE] 나라장터 모니터링 완료 | 적합 공고 ${FIT}건 | 상태: $STATUS\"}"
