# Config
# ========================================================================================

# 사이트 주소 (반드시 입력하세요)
url: https://7up.co.kr

# General settings
# ---------------------------------------------------------------------------------------
google_analytics: G-GC75WBSF6X
lang: kor
title: PASKA
description: >
  Thoughts, stories and ideas.
keywords: []
logo: /assets/img/logo.png

author:
  name: PASKA
  email: <mail@domain.tld>

# Add links to the sidebar.
menu:
  - title: 게시판
    url: /board/

copyright: © 2026. All rights reserved.

permalink: /:year-:month-:day-:title/

paginate: 10
paginate_path: /board/:num/


# Theme
# ---------------------------------------------------------------------------------------
remote_theme: hydecorp/hydejack@v9


# Customization
# ----------------------------------------------------------------------------------------
accent_image: /assets/img/sidebar-bg.jpg
accent_color: rgb(79,177,186)
theme_color: rgb(25,55,71)

defaults:
  - scope:
      path: hyde/
    values:
      accent_color: rgb(38,139,210)
      theme_color: rgb(32,32,32)
      accent_image:
        background: rgb(32,32,32)
        overlay: false
  - scope:
      path: assets/
    values:
      sitemap: false
  - scope:
      path: licenses/
    values:
      layout: plain
      sitemap: false
  - scope:
      type: projects
    values:
      seo:
        type: WebPage
  - scope:
      type: featured_categories
    values:
      seo:
        type: WebPage
  - scope:
      type: featured_tags
    values:
      seo:
        type: WebPage

kramdown:
  math_engine: katex
  math_engine_opts: {}
  footnote_backlink: '&#x21a9;&#xfe0e;'


# Hydejack Settings
# ----------------------------------------------------------------------------------------
hydejack:
  post_addons: [about, newsletter, related, random, comments]
  project_addons: [about, newsletter, other, comments]
  no_mark_external: false
  no_push_state: false
  no_drawer: false
  no_navbar: false
  no_search: false
  no_inline_css: false
  no_page_style: false
  no_break_layout: true
  no_toc: false
  no_third_column: false
  no_large_headings: false
  no_structured_data: false
  no_theme_color: false
  no_breadcrumbs: false
  use_lsi: true
  cookies_banner: false
  advertise: false
  hide_dates: false
  hide_last_modified: false
  dark_mode:
    always: false
    dynamic: true
    icon: true
  offline:
    enabled: false
    cache_version: 13
    precache_assets:
      - /assets/img/swipe.svg


# Collections
# ----------------------------------------------------------------------------------------
collections:
  featured_categories:
    permalink: /:name/
    output: true
  featured_tags:
    permalink: /tag-:name/
    output: true
  projects:
    permalink: /projects/:path/
    output: true


# File inclusion/exclusion
# ----------------------------------------------------------------------------------------
exclude:
  - .jekyll-cache
  - .sass-cache
  - .ruby-lsp
  - .wrangler
  - '*.toml'
  - vendor
  - Gemfile
  - Gemfile.lock
  - functions
  - licenses/
include:
  - _routes.json
  - .well-known
  - LICENSE.md


# Plugins
# ----------------------------------------------------------------------------------------
plugins:
  - jekyll-remote-theme
  - jekyll-default-layout
  - jekyll-feed
  - jekyll-optional-front-matter
  - jekyll-paginate
  - jekyll-readme-index
  - jekyll-redirect-from
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-titles-from-headings
  - jekyll-include-cache
  - jekyll-last-modified-at


# SEO Tag (여기에 인증 코드를 입력했습니다)
# ---------------------------------------------------------------------------------------
google_site_verification: 86xOL59ZhUp9jguwk_2m7BrTzIlYGDDb90vGd

# Plugin Configs
# ---------------------------------------------------------------------------------------
optional_front_matter:
  remove_originals: true

readme_index:
  remove_originals: true
  with_frontmatter: false

relative_links:
  collections: true

titles_from_headings:
  strip_title: true
  collections: true

compress_html:
  comments: [""]
  clippings: all
  endings: all
  ignore:
    envs: [development]

sass:
  style: compressed

jekyll_compose:
  default_front_matter:
    drafts:
      layout: post
      description: > 
        A short ~160 character description of your post for search engines,
        social media previews, etc.
      image:
        path: /assets/img/sidebar-bg.jpg
    posts:
      layout: post
      description: > 
        A short ~160 character description of your post for search engines,
        social media previews, etc.
      image:
        path: /assets/img/sidebar-bg.jpg
    projects:
      layout: project
      description: > 
        A short ~160 character description of your post for search engines,
        social media previews, etc.
      image:
        path: /assets/img/sidebar-bg.jpg
      links:
        - title: Project Link
          url: https://example.com
